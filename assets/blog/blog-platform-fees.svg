<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f0f00"/>
      <stop offset="100%" style="stop-color:#180a00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <line x1="0" y1="225" x2="800" y2="225" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="400" cy="185" r="80" fill="#f97316" fill-opacity="0.07"/>
  <!-- Shopping bag icon -->
  <g transform="translate(325, 108)" filter="url(#glow)">
    <!-- Bag body -->
    <path d="M15,45 L5,130 L145,130 L135,45 Z" fill="none" stroke="#f97316" stroke-width="3" stroke-linejoin="round"/>
    <path d="M15,45 L5,130 L145,130 L135,45 Z" fill="#f97316" fill-opacity="0.1"/>
    <!-- Handle -->
    <path d="M45,45 Q45,10 75,10 Q105,10 105,45" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <!-- Price tag star -->
    <circle cx="75" cy="88" r="22" fill="none" stroke="#f97316" stroke-width="2.5"/>
    <text x="75" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#f97316" fill-opacity="0.9">%</text>
    <!-- Store awning lines -->
    <line x1="5" y1="45" x2="135" y2="45" stroke="#f97316" stroke-width="2" stroke-opacity="0.5"/>
  </g>
  <text x="400" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#f97316" letter-spacing="3" opacity="0.9">PLATFORM FEES</text>
  <text x="400" y="306" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#fff5ee" letter-spacing="-0.5">Etsy · Shopify · Upwork</text>
  <text x="400" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#c49060" letter-spacing="0.3">Understand what every marketplace really takes from you</text>
  <rect x="0" y="440" width="800" height="10" fill="#f97316" fill-opacity="0.6"/>
  <text x="780" y="430" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#f97316" opacity="0.4">feexio.com</text>
</svg>
