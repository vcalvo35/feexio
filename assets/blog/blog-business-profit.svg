<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f12"/>
      <stop offset="100%" style="stop-color:#051a10"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <line x1="0" y1="225" x2="800" y2="225" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="400" cy="185" r="80" fill="#22c55e" fill-opacity="0.07"/>
  <!-- Upward chart bars -->
  <g transform="translate(290, 110)" filter="url(#glow)">
    <!-- Grid lines -->
    <line x1="0" y1="100" x2="220" y2="100" stroke="#22c55e" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="0" y1="70" x2="220" y2="70" stroke="#22c55e" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="0" y1="40" x2="220" y2="40" stroke="#22c55e" stroke-width="1" stroke-opacity="0.1"/>
    <!-- Bars -->
    <rect x="10" y="65" width="30" height="35" rx="4" fill="#22c55e" fill-opacity="0.4"/>
    <rect x="52" y="50" width="30" height="50" rx="4" fill="#22c55e" fill-opacity="0.5"/>
    <rect x="94" y="35" width="30" height="65" rx="4" fill="#22c55e" fill-opacity="0.6"/>
    <rect x="136" y="20" width="30" height="80" rx="4" fill="#22c55e" fill-opacity="0.75"/>
    <rect x="178" y="5" width="30" height="95" rx="4" fill="#22c55e" fill-opacity="0.9"/>
    <!-- Trend line -->
    <polyline points="25,65 67,50 109,35 151,20 193,5" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Trend arrow -->
    <polygon points="193,5 185,15 201,15" fill="#4ade80"/>
    <!-- Bottom axis -->
    <line x1="0" y1="100" x2="220" y2="100" stroke="#22c55e" stroke-width="2" stroke-opacity="0.5"/>
  </g>
  <text x="400" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#22c55e" letter-spacing="3" opacity="0.9">BUSINESS &amp; PROFIT</text>
  <text x="400" y="306" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#eafff2" letter-spacing="-0.5">Margins · Break-Even · Growth</text>
  <text x="400" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#86c99a" letter-spacing="0.3">Know your numbers before you price anything</text>
  <rect x="0" y="440" width="800" height="10" fill="#22c55e" fill-opacity="0.6"/>
  <text x="780" y="430" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#22c55e" opacity="0.4">feexio.com</text>
</svg>
