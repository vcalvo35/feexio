<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2626"/>
      <stop offset="100%" style="stop-color:#0a1e2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DB5A5;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1a8a7e;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <line x1="0" y1="225" x2="800" y2="225" stroke="#2DB5A5" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#2DB5A5" stroke-width="0.5" stroke-opacity="0.15"/>
  <!-- Glow circle -->
  <circle cx="400" cy="185" r="80" fill="#2DB5A5" fill-opacity="0.08"/>
  <!-- Credit card icon -->
  <g transform="translate(320, 120)" filter="url(#glow)">
    <rect x="0" y="0" width="160" height="105" rx="12" fill="none" stroke="#2DB5A5" stroke-width="3"/>
    <rect x="0" y="28" width="160" height="22" fill="#2DB5A5" fill-opacity="0.4"/>
    <rect x="16" y="68" width="52" height="10" rx="4" fill="#2DB5A5" fill-opacity="0.6"/>
    <rect x="16" y="84" width="80" height="7" rx="3" fill="#2DB5A5" fill-opacity="0.3"/>
    <circle cx="126" cy="80" r="12" fill="none" stroke="#2DB5A5" stroke-width="2"/>
    <circle cx="138" cy="80" r="12" fill="#2DB5A5" fill-opacity="0.5"/>
  </g>
  <!-- Label -->
  <text x="400" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2DB5A5" letter-spacing="3" opacity="0.9">PAYMENT FEES</text>
  <!-- Title -->
  <text x="400" y="306" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#e8f5f3" letter-spacing="-0.5">PayPal · Stripe · Processing</text>
  <!-- Tagline -->
  <text x="400" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8bbcb8" letter-spacing="0.3">Know exactly what you keep after every transaction</text>
  <!-- Bottom accent bar -->
  <rect x="0" y="440" width="800" height="10" fill="#2DB5A5" fill-opacity="0.6"/>
  <!-- Feexio watermark -->
  <text x="780" y="430" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#2DB5A5" opacity="0.4">feexio.com</text>
</svg>
