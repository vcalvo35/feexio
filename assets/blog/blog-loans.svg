<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#080f20"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <line x1="0" y1="225" x2="800" y2="225" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="400" cy="185" r="80" fill="#3b82f6" fill-opacity="0.07"/>
  <!-- House/bank icon -->
  <g transform="translate(315, 105)" filter="url(#glow)">
    <!-- Roof -->
    <polygon points="85,0 0,65 170,65" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="85,0 0,65 170,65" fill="#3b82f6" fill-opacity="0.12"/>
    <!-- Building body -->
    <rect x="20" y="65" width="130" height="75" rx="2" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="20" y="65" width="130" height="75" rx="2" fill="#3b82f6" fill-opacity="0.08"/>
    <!-- Columns -->
    <rect x="35" y="72" width="8" height="60" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
    <rect x="60" y="72" width="8" height="60" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
    <rect x="97" y="72" width="8" height="60" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
    <rect x="122" y="72" width="8" height="60" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
    <!-- Door -->
    <rect x="68" y="100" width="34" height="40" rx="3" fill="#3b82f6" fill-opacity="0.35"/>
    <!-- Steps -->
    <rect x="10" y="138" width="150" height="6" rx="2" fill="#3b82f6" fill-opacity="0.4"/>
  </g>
  <text x="400" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" letter-spacing="3" opacity="0.9">LOANS &amp; MORTGAGES</text>
  <text x="400" y="306" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#eef4ff" letter-spacing="-0.5">Mortgage · Amortization · Loans</text>
  <text x="400" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8ab4e8" letter-spacing="0.3">Plan your payments before you sign anything</text>
  <rect x="0" y="440" width="800" height="10" fill="#3b82f6" fill-opacity="0.6"/>
  <text x="780" y="430" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6" opacity="0.4">feexio.com</text>
</svg>
